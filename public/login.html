<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Добро пожаловать - COMPLEX PRINT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root {
            --brand-color: #F7A400; 
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        
        body { 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-color: #120424; 
            overflow: hidden; 
            position: relative;
            color: var(--text-main);
        }

        /* --- АНИМИРОВАННЫЙ ФОН --- */
        .bg-blobs {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.8;
            animation: float 12s infinite ease-in-out alternate;
        }

        .blob-1 { background: #F7A400; width: 50vw; height: 50vw; bottom: -10vw; left: -10vw; animation-delay: 0s; }
        .blob-2 { background: #d500f9; width: 45vw; height: 45vw; top: 10vw; right: -10vw; animation-delay: -4s; }
        .blob-3 { background: #4a00e0; width: 40vw; height: 40vw; top: -10vw; left: 10vw; animation-delay: -8s; }

        @keyframes float {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }

        /* --- ГЛАВНЫЙ ЭКРАН (HERO) --- */
        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 10;
            animation: fadeIn 1s ease forwards;
            padding: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-logo svg {
            height: 140px; /* Крупный логотип */
            width: auto;
            margin-bottom: 24px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .hero-title {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 12px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hero-subtitle {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
            font-weight: 400;
        }

        .action-buttons {
            display: flex;
            gap: 16px;
        }

        .btn-hero {
            padding: 16px 36px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 16px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-login {
            background: var(--brand-color);
            color: #000;
            box-shadow: 0 10px 20px rgba(247, 164, 0, 0.3);
        }

        .btn-login:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(247, 164, 0, 0.5); }

        .btn-register {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .btn-register:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-3px); }

        /* --- МОДАЛЬНЫЕ ОКНА (GLASSMORPHISM) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .glass-card {
            background: rgba(30, 31, 32, 0.45);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            transform: scale(0.9) translateY(20px);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .glass-card {
            transform: scale(1) translateY(0);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
        }
        .close-btn:hover { color: #fff; }

        .modal-title { font-size: 24px; font-weight: 600; text-align: center; margin-bottom: 10px; }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        
        .form-control {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }
        .form-control::placeholder { color: rgba(255,255,255,0.5); }
        .form-control:focus { border-color: var(--brand-color); background: rgba(0,0,0,0.5); }

        .btn-submit {
            background: var(--brand-color);
            color: #000;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn-submit:hover { opacity: 0.9; }

        .error-msg { color: #ff6b6b; font-size: 13px; text-align: center; display: none; }
        .success-msg { color: #81c995; font-size: 13px; text-align: center; display: none; }

        @media (max-width: 480px) {
            .hero-title { font-size: 40px; }
            .hero-logo svg { height: 100px; }
            .action-buttons { flex-direction: column; width: 100%; max-width: 250px;}
            .btn-hero { justify-content: center; }
            .glass-card { padding: 30px; border-radius: 0; border: none; min-height: 100vh; justify-content: center; }
            .close-btn { top: 30px; right: 30px; }
        }
    </style>
</head>

        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

        <h1 class="hero-title">Добро пожаловать!</h1>
        <p class="hero-subtitle">Внутренняя CRM-система управления заказами</p>
        
        <div class="action-buttons">
            <button class="btn-hero btn-login" onclick="openModal('modalLogin')">
                <span class="material-symbols-outlined">login</span> Вход
            </button>
            <button class="btn-hero btn-register" onclick="openModal('modalRegister')">
                <span class="material-symbols-outlined">person_add</span> Регистрация
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="modalLogin" onclick="closeModal(event, 'modalLogin')">
        <div class="glass-card" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal(null, 'modalLogin')"><span class="material-symbols-outlined">close</span></button>
            <h2 class="modal-title">Вход в систему</h2>
            
            <div class="form-group">
                <input type="text" id="loginName" class="form-control" placeholder="Имя пользователя" onkeypress="if(event.key === 'Enter') login()">
            </div>
            <div class="form-group">
                <input type="password" id="loginPass" class="form-control" placeholder="Пароль" onkeypress="if(event.key === 'Enter') login()">
            </div>

            <p id="loginError" class="error-msg"></p>
            <button class="btn-submit" onclick="login()">Войти</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalRegister" onclick="closeModal(event, 'modalRegister')">
        <div class="glass-card" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal(null, 'modalRegister')"><span class="material-symbols-outlined">close</span></button>
            <h2 class="modal-title">Регистрация</h2>
            
            <div class="form-group">
                <input type="text" id="regName" class="form-control" placeholder="Ваше Имя (Например: Булат)">
            </div>
            <div class="form-group">
                <input type="text" id="regRole" class="form-control" placeholder="Должность (Например: Менеджер)">
            </div>
            <div class="form-group">
                <input type="password" id="regPass" class="form-control" placeholder="Придумайте пароль">
            </div>

            <p id="regError" class="error-msg"></p>
            <p id="regSuccess" class="success-msg"></p>
            <button class="btn-submit" onclick="register()">Зарегистрироваться</button>
        </div>
    </div>

    <script>
        // Проверяем авторизацию
        window.onload = () => {
            if(localStorage.getItem('crm_token') || sessionStorage.getItem('crm_token')) {
                window.location.href = '/index.html';
            }
        };

        // Открытие и закрытие модальных окон
        function openModal(id) {
            document.getElementById(id).classList.add('active');
            // Очищаем ошибки при открытии
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('regError').style.display = 'none';
            document.getElementById('regSuccess').style.display = 'none';
        }

        function closeModal(e, id) {
            if (e) e.stopPropagation();
            document.getElementById(id).classList.remove('active');
        }

        // Логика входа
        async function login() {
            const name = document.getElementById('loginName').value;
            const pass = document.getElementById('loginPass').value;
            const errorMsg = document.getElementById('loginError');

            if(!name || !pass) {
                errorMsg.textContent = 'Пожалуйста, заполните все поля';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, password: pass })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('crm_token', data.token);
                    localStorage.setItem('crm_user', JSON.stringify(data.user));
                    window.location.href = '/index.html';
                } else {
                    errorMsg.textContent = data.error || 'Неверное имя или пароль';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Ошибка подключения к серверу';
                errorMsg.style.display = 'block';
            }
        }

        // Логика регистрации
        async function register() {
            const name = document.getElementById('regName').value;
            const role = document.getElementById('regRole').value;
            const pass = document.getElementById('regPass').value;
            
            const errorMsg = document.getElementById('regError');
            const successMsg = document.getElementById('regSuccess');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if(!name || !role || !pass) {
                errorMsg.textContent = 'Все поля обязательны для заполнения';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, role, password: pass })
                });

                const data = await res.json();

                if (res.ok) {
                    successMsg.textContent = 'Регистрация успешна! Теперь вы можете войти.';
                    successMsg.style.display = 'block';
                    
                    // Через секунду перекидываем на окно входа
                    setTimeout(() => {
                        closeModal(null, 'modalRegister');
                        document.getElementById('loginName').value = name; // Предзаполняем имя
                        openModal('modalLogin');
                    }, 1500);

                } else {
                    errorMsg.textContent = data.error || 'Ошибка регистрации (возможно имя занято)';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Ошибка подключения к серверу';
                errorMsg.style.display = 'block';
            }
        }
    </script>
